<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación de canciones de spotify según el texto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>De texto a canciones</h1>
    <form method="POST">
        <div class="input-container">
            <label for="user_input">Consulta:</label>
            <textarea id="user_input" name="user_input" rows="10" cols="50" required></textarea>
        </div>
        <div class="options-container">
            <div>
                <label for="num_elements">k top:</label>
                <input type="number" id="num_elements" name="num_elements" required>
            </div>
            <div>
                <label for="option">Método:</label>
                <select id="option" name="option">
                    <option value="option1">Implementación propia</option>
                    <option value="option2">Postgresql</option>
                </select>
            </div>
        </div>
        <button type="submit">Ejecutar</button>
    </form>
    {% if results %}
    <h2>Resultados:</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Score</th>
                <th>Letra</th>
            </tr>
        </thead>
        <tbody>
            {% for result in results %}
            <tr>
                <td>{{ result.id }}</td>
                <td>{{ result.score }}</td>
                <td>{{ result.text }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    {% endif %}
</body>
</html>
